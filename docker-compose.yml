services:
  sqlserver-produtos:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-produtos
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-produtos-data:/var/opt/mssql
    networks:
      - arquitetura-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-Q", "SELECT 1", "-C"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  sqlserver-pedidos:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-pedidos
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1434:1433"
    volumes:
      - sqlserver-pedidos-data:/var/opt/mssql
    networks:
      - arquitetura-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-Q", "SELECT 1", "-C"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - arquitetura-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  produtos-api:
    build:
      context: .
      dockerfile: services/Produtos/Produtos.Api/Dockerfile
    image: arquitetura/produtos-api:latest
    container_name: produtos-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__ProdutosConnection=Server=sqlserver-produtos;Database=ProdutosDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-guest}
      - RabbitMQ__Password=${RABBITMQ_PASS:-guest}
    networks:
      - arquitetura-net
    restart: unless-stopped
    depends_on:
      sqlserver-produtos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  pedidos-api:
    build:
      context: .
      dockerfile: services/Pedidos/Pedidos.Api/Dockerfile
    image: arquitetura/pedidos-api:latest
    container_name: pedidos-api
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__PedidosConnection=Server=sqlserver-pedidos;Database=PedidosDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - Services__ProdutosUrl=http://produtos-api:8080
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-guest}
      - RabbitMQ__Password=${RABBITMQ_PASS:-guest}
    networks:
      - arquitetura-net
    restart: unless-stopped
    depends_on:
      sqlserver-pedidos:
        condition: service_healthy
      produtos-api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  arquitetura-net:
    driver: bridge

volumes:
  sqlserver-produtos-data:
  sqlserver-pedidos-data:
  rabbitmq-data: